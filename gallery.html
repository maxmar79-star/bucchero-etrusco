<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria AR - mAjoRnext</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        /* STILI AGGIUNTIVI SOLO PER QUESTA PAGINA */
        model-viewer {
            --progress-bar-color: #e67e22; /* Barra caricamento arancione */
            position: relative;
            display: flex;
            justify-content: center;
        }

        .btn-ar-custom {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            bottom: 20px; /* Posizionato in basso all'interno del riquadro */
            left: 50%;
            transform: translateX(-50%); /* Centrato orizzontalmente */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* Nasconde il pulsante AR predefinito di Google */
        model-viewer::part(ar-button) {
            display: none;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">m<span class="highlight">A</span>jo<span class="highlight">R</span>next</div>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria AR - mAjoRnext</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <nav>
        <div class="logo">m<span class="highlight">A</span>jo<span class="highlight">R</span>next</div>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="storia.html">STORIA</a></li>
            <li><a href="gallery.html" class="active">GALLERIA AR</a></li>
            <li><a href="progetto.html">PROGETTO</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1 class="page-title">m<span class="highlight-text">A</span>jo<span class="highlight-text">R</span>next: AR GALLERY</h1>
        
        <div class="content-block">
            <p style="text-align: center; font-size: 1.1rem;">
                Benvenuti nella nostra esposizione digitale. In questa sezione puoi interagire con i reperti in <strong>Bucchero</strong> digitalizzati dal nostro team.
            </p>
        </div>

        <div class="gallery-container">
            <div class="artifact-card">
                <model-viewer src="bucchero_calice_dal_tumulo_di_Molinello.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate touch-action="pan-y">
                    <div class="progress-bar" slot="progress-bar">
                        <div class="update-bar"></div>
                    </div>
                    <button slot="ar-button" class="btn-ar">VEDI IN AR</button>
                </model-viewer>
                <div class="info"><h3>Calice Molinello</h3></div>
            </div>

            <div class="artifact-card">
                <model-viewer src="bucchero_kantharos.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate touch-action="pan-y">
                    <div class="progress-bar" slot="progress-bar"><div class="update-bar"></div></div>
                    <button slot="ar-button" class="btn-ar">VEDI IN AR</button>
                </model-viewer>
                <div class="info"><h3>Kantharos</h3></div>
            </div>

            </div>
    </main>

    <footer>© 2026 mAjoRnext - Majorana Etruscan ARchaeology</footer>

    <script>
        // Script per Menu Mobile (identico al tuo)
        const hb = document.getElementById('hamburger');
        const nl = document.getElementById('nav-links');
        hb.onclick = () => {
            nl.classList.toggle('active');
        };

        // Script per gestire la barra arancione
        document.querySelectorAll('model-viewer').forEach(item => {
            item.addEventListener('progress', (event) => {
                const bar = item.querySelector('.update-bar');
                const progress = event.detail.totalProgress * 100;
                if (bar) bar.style.width = `${progress}%`;
            });
        });
    </script>
</body>
</html>
